name: Java CI with Maven

on:
  push:
    branches: ["main", "master", "protocol-v5-port"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "master", "protocol-v5-port"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build with Maven
        run: mvn -B clean verify -DskipTests

      - name: Get project version
        id: get_version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Female-Gender-Mod-Plugin-${{ steps.get_version.outputs.VERSION }}
          path: target/*.jar

      - name: Create/Update Latest Development Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: latest-dev
          name: Latest Development Build
          body: |
            Automated development build from branch `${{ github.ref_name }}`.
            Commit: ${{ github.sha }}

            > [!TIP]
            > This release is automatically updated on every push.
          files: target/*.jar
          prerelease: true
          make_latest: false

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Release build for version `${{ steps.get_version.outputs.VERSION }}`.
            Tag: `${{ github.ref_name }}`
          files: target/*.jar
          draft: false
          prerelease: false
          make_latest: true
