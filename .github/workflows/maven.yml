name: Java CI with Maven

on:
  push:
    branches: ["main", "protocol-v5-port"]
  pull_request:
    branches: ["main", "protocol-v5-port"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify
